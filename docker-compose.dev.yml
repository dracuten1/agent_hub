services:
  db-dev:
    image: postgres:15-alpine
    container_name: agenthub-db-dev
    environment:
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: Ag3nThub2026S3cur3
      POSTGRES_DB: agenthub
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthub"]
      interval: 5s
      timeout: 3s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data  # In-memory — no persistence, fresh on every start
    # No restart policy — dev only

  api-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: agenthub-api-dev
    ports:
      - "8082:8081"
    environment:
      DATABASE_URL: postgres://agenthub:Ag3nThub2026S3cur3@db-dev:5432/agenthub?sslmode=disable
      JWT_SECRET: dev-secret-not-for-production
      PORT: "8081"
      AGENTHUB_ADMIN_PASS: ${AGENTHUB_ADMIN_PASS:-admin123}
    depends_on:
      db-dev:
        condition: service_healthy
    # No restart policy — stop when you stop it
    # No healthcheck — dev only
